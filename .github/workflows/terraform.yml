name: Terraform AWS

on:
  push:
    branches: [main]

  workflow_dispatch: 
  workflow_call:
  
permissions: 
      id-token: write
      checks: write
      contents: write
      deployments: write
      

jobs:
   call-workflow-passing-data:
      uses: vinayellulla/GitHub-Actions/.github/workflows/automate_readMe.yml@main
   terraform:
      name: Terraform script
      runs-on: ubuntu-latest

      defaults:
        run:
          shell: bash
      steps:
        - name: checkout
          uses: actions/checkout@v3
          
        - name: configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::666531394927:role/GitHub-runners
            aws-region: ap-southeast-2
            
        - name: Terraform Setup
          uses: hashicorp/setup-terraform@v2

        - name: Terraform init
          run: terraform init

        - name: Terraform format
          run: terraform fmt -check

        - name: Terraform validae
          run: terraform validate

        - name: Terraform plan
          run: terraform plan

        - name: Terraform apply
          if: github.ref == 'refs/heads/main' && github.event_name == 'push'
          run: terraform apply -auto-approve
